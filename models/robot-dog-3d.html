<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كلب روبوت 3D - Robot Dog</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a1a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10, 10, 26, 0.9), transparent);
        }

        .title-area h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7, #ff2d87);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-area p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 2px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-export {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 212, 255, 0.5);
        }

        .btn-obj {
            background: linear-gradient(135deg, #ff2d87, #ff6b35);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255, 45, 135, 0.3);
        }

        .btn-obj:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 45, 135, 0.5);
        }

        .btn-animate {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-animate:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-animate.active {
            background: linear-gradient(135deg, #00d4ff33, #7b2ff733);
            border-color: #00d4ff;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: center;
            gap: 30px;
            z-index: 100;
            background: linear-gradient(to top, rgba(10, 10, 26, 0.9), transparent);
        }

        .info-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .info-chip .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00d4ff;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-screen p {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: #fff;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div class="loading-screen" id="loading">
        <div class="loader"></div>
        <p>جاري بناء الكلب الروبوت...</p>
    </div>

    <div class="ui-overlay">
        <div class="title-area">
            <h1>🤖🐕 كلب روبوت ثلاثي الأبعاد</h1>
            <p>حرّك الماوس لتدوير النموذج • سكرول للتقريب والتبعيد</p>
        </div>
        <div class="controls">
            <button class="btn btn-animate" id="btn-animate" onclick="toggleAnimation()">
                🦿 تحريك المشي
            </button>
            <button class="btn btn-obj" onclick="exportOBJ()">
                📦 تحميل OBJ
            </button>
            <button class="btn btn-export" onclick="exportSTL()">
                💾 تحميل STL
            </button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div class="bottom-bar">
        <div class="info-chip">
            <span class="dot"></span>
            الأجزاء: الجسم + الرأس + 4 أرجل + 8 مفاصل
        </div>
        <div class="info-chip">
            <span class="dot" style="background:#7b2ff7"></span>
            قابل للاستيراد في Fusion 360
        </div>
        <div class="info-chip">
            <span class="dot" style="background:#ff2d87"></span>
            نموذج تفاعلي
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ========== SCENE SETUP ==========
        let scene, camera, renderer, controls;
        let robotDog;
        let isAnimating = false;
        let animationTime = 0;
        let legParts = { FL: {}, FR: {}, BL: {}, BR: {} };

        function init() {
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(200, 150, 250);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.maxPolarAngle = Math.PI * 0.85;
            controls.minDistance = 100;
            controls.maxDistance = 500;
            controls.target.set(0, 40, 0);

            // Lights
            setupLights();

            // Ground
            createGround();

            // Robot Dog
            robotDog = new THREE.Group();
            buildRobotDog();
            scene.add(robotDog);

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 800);

            // Resize
            window.addEventListener('resize', onResize);

            // Animate
            animate();
        }

        function setupLights() {
            // Ambient
            const ambient = new THREE.AmbientLight(0x334466, 0.6);
            scene.add(ambient);

            // Main light
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
            mainLight.position.set(100, 200, 150);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 10;
            mainLight.shadow.camera.far = 500;
            mainLight.shadow.camera.left = -150;
            mainLight.shadow.camera.right = 150;
            mainLight.shadow.camera.top = 150;
            mainLight.shadow.camera.bottom = -150;
            scene.add(mainLight);

            // Fill light - cyan
            const fillLight = new THREE.DirectionalLight(0x00d4ff, 0.4);
            fillLight.position.set(-100, 100, -50);
            scene.add(fillLight);

            // Rim light - purple
            const rimLight = new THREE.DirectionalLight(0x7b2ff7, 0.3);
            rimLight.position.set(0, 50, -150);
            scene.add(rimLight);

            // Accent - pink
            const accentLight = new THREE.PointLight(0xff2d87, 0.5, 300);
            accentLight.position.set(-80, 80, 80);
            scene.add(accentLight);
        }

        function createGround() {
            // Grid
            const gridHelper = new THREE.GridHelper(400, 40, 0x1a1a3e, 0x111133);
            gridHelper.position.y = -1;
            scene.add(gridHelper);

            // Ground plane
            const groundGeo = new THREE.PlaneGeometry(400, 400);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x0d0d20,
                roughness: 0.9,
                metalness: 0.1
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -1;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        // ========== MATERIALS ==========
        const materials = {
            body: new THREE.MeshStandardMaterial({
                color: 0xe8e8ef,
                roughness: 0.3,
                metalness: 0.6,
            }),
            bodyDark: new THREE.MeshStandardMaterial({
                color: 0x2a2a3e,
                roughness: 0.4,
                metalness: 0.7,
            }),
            metal: new THREE.MeshStandardMaterial({
                color: 0x888899,
                roughness: 0.2,
                metalness: 0.9,
            }),
            joint: new THREE.MeshStandardMaterial({
                color: 0x444455,
                roughness: 0.3,
                metalness: 0.8,
            }),
            eye: new THREE.MeshStandardMaterial({
                color: 0x00d4ff,
                emissive: 0x00d4ff,
                emissiveIntensity: 2.0,
                roughness: 0.1,
                metalness: 0.3,
            }),
            accent: new THREE.MeshStandardMaterial({
                color: 0x00d4ff,
                emissive: 0x00d4ff,
                emissiveIntensity: 0.8,
                roughness: 0.2,
                metalness: 0.5,
            }),
            foot: new THREE.MeshStandardMaterial({
                color: 0x222233,
                roughness: 0.8,
                metalness: 0.2,
            }),
        };

        // ========== HELPER FUNCTIONS ==========
        function createRoundedBox(width, height, depth, radius, segments) {
            const shape = new THREE.Shape();
            const w = width / 2 - radius;
            const h = height / 2 - radius;

            shape.moveTo(-w, -height / 2);
            shape.lineTo(w, -height / 2);
            shape.quadraticCurveTo(width / 2, -height / 2, width / 2, -h);
            shape.lineTo(width / 2, h);
            shape.quadraticCurveTo(width / 2, height / 2, w, height / 2);
            shape.lineTo(-w, height / 2);
            shape.quadraticCurveTo(-width / 2, height / 2, -width / 2, h);
            shape.lineTo(-width / 2, -h);
            shape.quadraticCurveTo(-width / 2, -height / 2, -w, -height / 2);

            const extrudeSettings = {
                depth: depth,
                bevelEnabled: true,
                bevelThickness: radius * 0.5,
                bevelSize: radius * 0.5,
                bevelSegments: segments || 3
            };

            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geometry.center();
            return geometry;
        }

        // ========== BUILD ROBOT DOG ==========
        function buildRobotDog() {
            buildBody();
            buildHead();
            buildLeg('FL', 35, 0, 22);   // Front Left
            buildLeg('FR', 35, 0, -22);   // Front Right
            buildLeg('BL', -35, 0, 22);   // Back Left
            buildLeg('BR', -35, 0, -22);  // Back Right
            buildTail();
        }

        function buildBody() {
            const bodyGroup = new THREE.Group();

            // Main body - top shell
            const bodyTopGeo = createRoundedBox(100, 30, 50, 6, 4);
            const bodyTop = new THREE.Mesh(bodyTopGeo, materials.body);
            bodyTop.position.y = 65;
            bodyTop.castShadow = true;
            bodyGroup.add(bodyTop);

            // Body bottom plate
            const bodyBottomGeo = createRoundedBox(90, 6, 44, 3, 3);
            const bodyBottom = new THREE.Mesh(bodyBottomGeo, materials.bodyDark);
            bodyBottom.position.y = 48;
            bodyBottom.castShadow = true;
            bodyGroup.add(bodyBottom);

            // Top ridge / spine detail
            const ridgeGeo = new THREE.BoxGeometry(70, 3, 10);
            const ridge = new THREE.Mesh(ridgeGeo, materials.bodyDark);
            ridge.position.y = 82;
            bodyGroup.add(ridge);

            // Accent strips on sides
            const stripGeo = new THREE.BoxGeometry(60, 2, 1);
            const stripL = new THREE.Mesh(stripGeo, materials.accent);
            stripL.position.set(0, 72, 26);
            bodyGroup.add(stripL);

            const stripR = new THREE.Mesh(stripGeo, materials.accent);
            stripR.position.set(0, 72, -26);
            bodyGroup.add(stripR);

            // Shoulder mounts
            const mountGeo = new THREE.CylinderGeometry(8, 8, 8, 16);

            const mountFL = new THREE.Mesh(mountGeo, materials.joint);
            mountFL.position.set(35, 55, 28);
            mountFL.rotation.x = Math.PI / 2;
            bodyGroup.add(mountFL);

            const mountFR = new THREE.Mesh(mountGeo, materials.joint);
            mountFR.position.set(35, 55, -28);
            mountFR.rotation.x = Math.PI / 2;
            bodyGroup.add(mountFR);

            const mountBL = new THREE.Mesh(mountGeo, materials.joint);
            mountBL.position.set(-35, 55, 28);
            mountBL.rotation.x = Math.PI / 2;
            bodyGroup.add(mountBL);

            const mountBR = new THREE.Mesh(mountGeo, materials.joint);
            mountBR.position.set(-35, 55, -28);
            mountBR.rotation.x = Math.PI / 2;
            bodyGroup.add(mountBR);

            robotDog.add(bodyGroup);
        }

        function buildHead() {
            const headGroup = new THREE.Group();

            // Neck
            const neckGeo = new THREE.BoxGeometry(14, 12, 20);
            const neck = new THREE.Mesh(neckGeo, materials.bodyDark);
            neck.position.set(52, 72, 0);
            headGroup.add(neck);

            // Head main
            const headGeo = createRoundedBox(40, 28, 38, 5, 3);
            const head = new THREE.Mesh(headGeo, materials.body);
            head.position.set(72, 76, 0);
            head.castShadow = true;
            headGroup.add(head);

            // Head bottom / jaw
            const jawGeo = createRoundedBox(35, 8, 34, 3, 2);
            const jaw = new THREE.Mesh(jawGeo, materials.bodyDark);
            jaw.position.set(73, 60, 0);
            headGroup.add(jaw);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(4, 16, 16);

            const eyeL = new THREE.Mesh(eyeGeo, materials.eye);
            eyeL.position.set(90, 80, 10);
            eyeL.scale.z = 0.5;
            headGroup.add(eyeL);

            const eyeR = new THREE.Mesh(eyeGeo, materials.eye);
            eyeR.position.set(90, 80, -10);
            eyeR.scale.z = 0.5;
            headGroup.add(eyeR);

            // Eye glow rings
            const eyeRingGeo = new THREE.RingGeometry(4.5, 6, 20);
            const eyeRingMat = new THREE.MeshBasicMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });

            const eyeRingL = new THREE.Mesh(eyeRingGeo, eyeRingMat);
            eyeRingL.position.set(92, 80, 10);
            eyeRingL.rotation.y = Math.PI / 2;
            headGroup.add(eyeRingL);

            const eyeRingR = new THREE.Mesh(eyeRingGeo, eyeRingMat);
            eyeRingR.position.set(92, 80, -10);
            eyeRingR.rotation.y = Math.PI / 2;
            headGroup.add(eyeRingR);

            // Nose / sensor
            const sensorGeo = new THREE.BoxGeometry(2, 4, 12);
            const sensor = new THREE.Mesh(sensorGeo, materials.accent);
            sensor.position.set(93, 72, 0);
            headGroup.add(sensor);

            // Ears
            const earGeo = new THREE.BoxGeometry(6, 14, 5);

            const earL = new THREE.Mesh(earGeo, materials.bodyDark);
            earL.position.set(68, 95, 14);
            earL.rotation.z = 0.2;
            headGroup.add(earL);

            const earR = new THREE.Mesh(earGeo, materials.bodyDark);
            earR.position.set(68, 95, -14);
            earR.rotation.z = 0.2;
            headGroup.add(earR);

            // Ear tips glow
            const earTipGeo = new THREE.BoxGeometry(4, 3, 4);

            const earTipL = new THREE.Mesh(earTipGeo, materials.accent);
            earTipL.position.set(68, 103, 14);
            headGroup.add(earTipL);

            const earTipR = new THREE.Mesh(earTipGeo, materials.accent);
            earTipR.position.set(68, 103, -14);
            headGroup.add(earTipR);

            robotDog.add(headGroup);
        }

        function buildLeg(id, x, y, z) {
            const legGroup = new THREE.Group();
            const side = z > 0 ? 1 : -1;

            // Upper leg pivot
            const upperPivot = new THREE.Group();
            upperPivot.position.set(x, 52, z);

            // Upper leg
            const upperGeo = createRoundedBox(14, 30, 12, 3, 2);
            const upper = new THREE.Mesh(upperGeo, materials.body);
            upper.position.set(0, -16, 0);
            upper.castShadow = true;
            upperPivot.add(upper);

            // Upper leg accent
            const upperAccentGeo = new THREE.BoxGeometry(1.5, 20, 8);
            const upperAccent = new THREE.Mesh(upperAccentGeo, materials.accent);
            upperAccent.position.set(side * 7, -16, 0);
            upperPivot.add(upperAccent);

            // Knee joint
            const kneeJointGeo = new THREE.SphereGeometry(6, 12, 12);
            const kneeJoint = new THREE.Mesh(kneeJointGeo, materials.joint);
            kneeJoint.position.set(0, -32, 0);
            upperPivot.add(kneeJoint);

            // Lower leg pivot
            const lowerPivot = new THREE.Group();
            lowerPivot.position.set(0, -32, 0);

            // Lower leg
            const lowerGeo = createRoundedBox(10, 32, 10, 2, 2);
            const lower = new THREE.Mesh(lowerGeo, materials.metal);
            lower.position.set(0, -18, 0);
            lower.castShadow = true;
            lowerPivot.add(lower);

            // Lower leg accent
            const lowerAccentGeo = new THREE.BoxGeometry(1, 22, 6);
            const lowerAccent = new THREE.Mesh(lowerAccentGeo, materials.accent);
            lowerAccent.position.set(side * 5.5, -14, 0);
            lowerPivot.add(lowerAccent);

            // Ankle joint
            const ankleGeo = new THREE.SphereGeometry(4.5, 10, 10);
            const ankle = new THREE.Mesh(ankleGeo, materials.joint);
            ankle.position.set(0, -35, 0);
            lowerPivot.add(ankle);

            // Foot
            const footGeo = new THREE.CylinderGeometry(7, 8, 5, 12);
            const foot = new THREE.Mesh(footGeo, materials.foot);
            foot.position.set(0, -40, 0);
            foot.castShadow = true;
            lowerPivot.add(foot);

            // Foot pad glow
            const padGeo = new THREE.CylinderGeometry(5, 5, 1, 12);
            const pad = new THREE.Mesh(padGeo, materials.accent);
            pad.position.set(0, -42.5, 0);
            lowerPivot.add(pad);

            upperPivot.add(lowerPivot);
            legGroup.add(upperPivot);
            robotDog.add(legGroup);

            // Store references for animation
            legParts[id] = {
                upper: upperPivot,
                lower: lowerPivot
            };
        }

        function buildTail() {
            const tailGroup = new THREE.Group();

            // Tail base
            const tailBaseGeo = new THREE.CylinderGeometry(4, 3, 20, 8);
            const tailBase = new THREE.Mesh(tailBaseGeo, materials.bodyDark);
            tailBase.position.set(-55, 78, 0);
            tailBase.rotation.z = -Math.PI / 3;
            tailGroup.add(tailBase);

            // Tail tip glow
            const tailTipGeo = new THREE.SphereGeometry(3.5, 10, 10);
            const tailTip = new THREE.Mesh(tailTipGeo, materials.accent);
            tailTip.position.set(-65, 88, 0);
            tailGroup.add(tailTip);

            robotDog.add(tailGroup);
        }

        // ========== ANIMATION ==========
        function toggleAnimation() {
            isAnimating = !isAnimating;
            const btn = document.getElementById('btn-animate');
            btn.classList.toggle('active', isAnimating);
            btn.textContent = isAnimating ? '⏸ إيقاف المشي' : '🦿 تحريك المشي';
        }

        function animateLegs(time) {
            if (!isAnimating) return;

            const speed = 3;
            const upperSwing = 0.35;
            const lowerSwing = 0.5;

            // Diagonal gait: FL+BR together, FR+BL together
            // Front Left
            legParts.FL.upper.rotation.z = Math.sin(time * speed) * upperSwing;
            legParts.FL.lower.rotation.z = Math.sin(time * speed + 0.5) * lowerSwing + 0.3;

            // Back Right (same phase as FL)
            legParts.BR.upper.rotation.z = Math.sin(time * speed) * upperSwing;
            legParts.BR.lower.rotation.z = Math.sin(time * speed + 0.5) * lowerSwing + 0.3;

            // Front Right (opposite phase)
            legParts.FR.upper.rotation.z = Math.sin(time * speed + Math.PI) * upperSwing;
            legParts.FR.lower.rotation.z = Math.sin(time * speed + Math.PI + 0.5) * lowerSwing + 0.3;

            // Back Left (opposite phase)
            legParts.BL.upper.rotation.z = Math.sin(time * speed + Math.PI) * upperSwing;
            legParts.BL.lower.rotation.z = Math.sin(time * speed + Math.PI + 0.5) * lowerSwing + 0.3;
        }

        // ========== EXPORT STL ==========
        function exportSTL() {
            showToast('⏳ جاري تجهيز ملف STL...');

            setTimeout(() => {
                const stlString = generateSTL(robotDog);
                downloadFile(stlString, 'robot_dog.stl', 'application/octet-stream');
                showToast('✅ تم تحميل ملف STL بنجاح! استورده في Fusion 360');
            }, 500);
        }

        function generateSTL(object) {
            let output = 'solid robotdog\n';

            object.traverse(function (child) {
                if (child.isMesh) {
                    const geometry = child.geometry.clone();
                    // Apply the world matrix to get absolute positions
                    child.updateWorldMatrix(true, false);
                    geometry.applyMatrix4(child.matrixWorld);

                    if (geometry.index !== null) {
                        geometry.toNonIndexed();
                    }

                    // Make sure we have the needed attribute
                    const positionAttr = geometry.getAttribute('position');
                    if (!positionAttr) return;

                    // Compute normals if missing
                    geometry.computeVertexNormals();
                    const normalAttr = geometry.getAttribute('normal');

                    for (let i = 0; i < positionAttr.count; i += 3) {
                        // Face normal (average of vertex normals)
                        const nx = (normalAttr.getX(i) + normalAttr.getX(i + 1) + normalAttr.getX(i + 2)) / 3;
                        const ny = (normalAttr.getY(i) + normalAttr.getY(i + 1) + normalAttr.getY(i + 2)) / 3;
                        const nz = (normalAttr.getZ(i) + normalAttr.getZ(i + 1) + normalAttr.getZ(i + 2)) / 3;

                        output += `  facet normal ${nx} ${ny} ${nz}\n`;
                        output += '    outer loop\n';

                        for (let j = 0; j < 3; j++) {
                            const idx = i + j;
                            output += `      vertex ${positionAttr.getX(idx)} ${positionAttr.getY(idx)} ${positionAttr.getZ(idx)}\n`;
                        }

                        output += '    endloop\n';
                        output += '  endfacet\n';
                    }

                    geometry.dispose();
                }
            });

            output += 'endsolid robotdog\n';
            return output;
        }

        // ========== EXPORT OBJ ==========
        function exportOBJ() {
            showToast('⏳ جاري تجهيز ملف OBJ...');

            setTimeout(() => {
                const objString = generateOBJ(robotDog);
                downloadFile(objString, 'robot_dog.obj', 'text/plain');
                showToast('✅ تم تحميل ملف OBJ بنجاح! استورده في Fusion 360');
            }, 500);
        }

        function generateOBJ(object) {
            let output = '# Robot Dog - OBJ Export\n';
            output += '# Generated by Fusion Robot Dog Builder\n\n';

            let vertexOffset = 0;
            let meshIndex = 0;

            object.traverse(function (child) {
                if (child.isMesh) {
                    meshIndex++;
                    output += `o Part_${meshIndex}\n`;

                    const geometry = child.geometry.clone();
                    child.updateWorldMatrix(true, false);
                    geometry.applyMatrix4(child.matrixWorld);

                    if (geometry.index !== null) {
                        const nonIndexed = geometry.toNonIndexed();
                        const posAttr = nonIndexed.getAttribute('position');
                        nonIndexed.computeVertexNormals();
                        const normAttr = nonIndexed.getAttribute('normal');

                        for (let i = 0; i < posAttr.count; i++) {
                            output += `v ${posAttr.getX(i).toFixed(4)} ${posAttr.getY(i).toFixed(4)} ${posAttr.getZ(i).toFixed(4)}\n`;
                        }
                        for (let i = 0; i < normAttr.count; i++) {
                            output += `vn ${normAttr.getX(i).toFixed(4)} ${normAttr.getY(i).toFixed(4)} ${normAttr.getZ(i).toFixed(4)}\n`;
                        }
                        for (let i = 0; i < posAttr.count; i += 3) {
                            const a = vertexOffset + i + 1;
                            const b = vertexOffset + i + 2;
                            const c = vertexOffset + i + 3;
                            output += `f ${a}//${a} ${b}//${b} ${c}//${c}\n`;
                        }
                        vertexOffset += posAttr.count;
                        nonIndexed.dispose();
                    } else {
                        const posAttr = geometry.getAttribute('position');
                        geometry.computeVertexNormals();
                        const normAttr = geometry.getAttribute('normal');

                        for (let i = 0; i < posAttr.count; i++) {
                            output += `v ${posAttr.getX(i).toFixed(4)} ${posAttr.getY(i).toFixed(4)} ${posAttr.getZ(i).toFixed(4)}\n`;
                        }
                        for (let i = 0; i < normAttr.count; i++) {
                            output += `vn ${normAttr.getX(i).toFixed(4)} ${normAttr.getY(i).toFixed(4)} ${normAttr.getZ(i).toFixed(4)}\n`;
                        }
                        for (let i = 0; i < posAttr.count; i += 3) {
                            const a = vertexOffset + i + 1;
                            const b = vertexOffset + i + 2;
                            const c = vertexOffset + i + 3;
                            output += `f ${a}//${a} ${b}//${b} ${c}//${c}\n`;
                        }
                        vertexOffset += posAttr.count;
                    }

                    geometry.dispose();
                    output += '\n';
                }
            });

            return output;
        }

        // ========== UTILITIES ==========
        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ========== RENDER LOOP ==========
        function animate() {
            requestAnimationFrame(animate);

            animationTime += 0.016;

            // Animate legs
            animateLegs(animationTime);

            // Subtle body breathing
            if (robotDog) {
                robotDog.position.y = Math.sin(animationTime * 1.5) * 0.8;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Start
        init();
    </script>
</body>

</html>
